name: Code Quality Checks

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  mobile:
    name: Mobile — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - run: npm run type-check
        env:
          NODE_OPTIONS: --max-old-space-size=4096

