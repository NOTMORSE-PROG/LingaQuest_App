name: Build Android APK

on:
  workflow_run:
    workflows: ['Code Quality Checks']
    types: [completed]

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}" > .env
          echo "EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}" >> .env
          echo "EXPO_PUBLIC_PUSHER_KEY=${{ secrets.EXPO_PUBLIC_PUSHER_KEY }}" >> .env
          echo "EXPO_PUBLIC_PUSHER_CLUSTER=${{ secrets.EXPO_PUBLIC_PUSHER_CLUSTER }}" >> .env

      - name: Generate native Android code (Expo Prebuild)
        run: npx expo prebuild --platform android --clean

      - name: Restore debug.keystore for Google Sign-In
        run: |
          printf '%s' "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > android/app/debug.keystore
          echo "Restored debug.keystore — SHA-1: 5E:8F:16:06:2E:A3:CD:2C:4A:0D:54:78:76:BA:A6:F3:8C:AB:F6:25"

      - name: Restore Gradle JVM memory settings
        run: |
          echo "" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -Xms512m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8" >> android/gradle.properties
          echo "kotlin.daemon.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build release APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a

      - name: Extract git metadata
        id: meta
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          BRANCH_SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g')
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M)
          COMMIT_MSG=$(git log -1 --format="%s" ${{ github.event.workflow_run.head_sha }})
          APK_NAME="LinguaQuest-${BRANCH_SLUG}-${SHORT_SHA}-${TIMESTAMP}.apk"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "branch_slug=$BRANCH_SLUG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
          cp "$APK_PATH" ${{ steps.meta.outputs.apk_name }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.meta.outputs.branch_slug }}-${{ steps.meta.outputs.short_sha }}
          name: "LinguaQuest [${{ steps.meta.outputs.branch }}] ${{ steps.meta.outputs.short_sha }}"
          body: |
            **Branch:** `${{ steps.meta.outputs.branch }}`
            **Commit:** `${{ steps.meta.outputs.short_sha }}`
            **Message:** ${{ steps.meta.outputs.commit_msg }}
            **Built:** ${{ steps.meta.outputs.timestamp }}
          files: ${{ steps.meta.outputs.apk_name }}
          prerelease: ${{ github.event.workflow_run.head_branch != 'master' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        run: |
          echo "## LinguaQuest APK Build" >> $GITHUB_STEP_SUMMARY
          echo "- **APK:** \`${{ steps.meta.outputs.apk_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ steps.meta.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ steps.meta.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
